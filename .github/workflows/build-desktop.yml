name: Build Desktop App

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'apps/desktop/**'
      - 'apps/web/**'
      - 'packages/**'
      - 'package.json'
      - 'bun.lock'
      - 'turbo.json'
  pull_request:
    branches: [main]
    paths:
      - 'apps/desktop/**'
      - 'apps/web/**'
      - 'packages/**'
      - 'package.json'
      - 'bun.lock'
      - 'turbo.json'
  workflow_dispatch:

env:
  ELECTROBUN_VERSION: '^1.15.1'

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            artifact_name: financial-tracker-sea-linux
          - os: macos-latest
            platform: macos
            artifact_name: financial-tracker-sea-macos
          - os: windows-latest
            platform: windows
            artifact_name: financial-tracker-sea-windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js (for CEF build tools)
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      # Linux-specific system dependencies for CEF bundling
      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-0 \
            libnss3 \
            libnspr4 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libdrm2 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libgbm1 \
            libpango-1.0-0 \
            libcairo2 \
            libasound2 \
            libxshmfence1 \
            libx11-xcb1 \
            libxss1

      - name: Install dependencies
        run: bun install

      - name: Cache Turborepo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Build web app
        run: bun turbo -F web build

      - name: Install Electrobun CLI
        run: bun install -g electrobun@${{ env.ELECTROBUN_VERSION }}

      - name: Build desktop app
        working-directory: apps/desktop
        run: electrobun build

      - name: List build output
        if: matrix.platform != 'windows'
        run: find apps/desktop/build -type f -name '*.deb' -o -name '*.rpm' -o -name '*.dmg' -o -name '*.AppImage' -o -name '*.zip' -o -name '*.tar.gz' 2>/dev/null || find apps/desktop/build -type f 2>/dev/null | head -20

      - name: List build output (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: Get-ChildItem -Path apps/desktop/build -Recurse -File | Select-Object -ExpandProperty FullName

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: apps/desktop/build/
          retention-days: 14
          if-no-files-found: warn
