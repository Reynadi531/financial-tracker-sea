name: Release Desktop App

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            artifact_name: financial-tracker-sea-linux
          - os: macos-latest
            platform: macos
            artifact_name: financial-tracker-sea-macos
          - os: windows-latest
            platform: windows
            artifact_name: financial-tracker-sea-windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-0 libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 \
            libxrandr2 libgbm1 libpango-1.0-0 libcairo2 libasound2 \
            libxshmfence1 libx11-xcb1 libxss1

      - name: Install dependencies
        run: bun install

      - name: Cache Turborepo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Build web app
        run: bun turbo -F web build

      - name: Install Electrobun CLI
        run: bun install -g electrobun@^1.15.1

      - name: Build desktop app
        working-directory: apps/desktop
        run: electrobun build

      - name: List build output
        if: matrix.platform != 'windows'
        run: find apps/desktop/build -type f 2>/dev/null | head -30

      - name: List build output (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: Get-ChildItem -Path apps/desktop/build -Recurse -File | Select-Object -ExpandProperty FullName

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: apps/desktop/build/
          retention-days: 5
          if-no-files-found: warn

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: List release files
        run: find dist -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'rc') || contains(github.ref_name, 'canary') }}
